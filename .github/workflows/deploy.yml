name: ElectWise CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports
        run: python -c "from ai_layer.knowledge_base import kb; from ai_layer.agents import MultiAgentPipeline; print(f'KB loaded: {len(kb.docs)} docs')"

      - name: Run API health check (dry run)
        run: python -c "import main; print('FastAPI app loaded OK')"

  # ── Job 2: Build Docker image ───────────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t electwise:latest .

      - name: Smoke test container
        run: |
          docker run -d -p 8080:8080 --name ew_test \
            -e GEMINI_API_KEY=test_key_placeholder \
            electwise:latest
          sleep 5
          curl -f http://localhost:8080/health || (docker logs ew_test && exit 1)
          docker stop ew_test && docker rm ew_test

  # ── Job 3: Deploy to Cloud Run (main branch only) ───────────────────────────
  deploy:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy electwise \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --project ${{ secrets.GCP_PROJECT_ID }}
