name: ElectWise CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify AI layer imports
        run: |
          python -c "
          from ai_layer.knowledge_base import kb
          from ai_layer.agents import MultiAgentPipeline
          print('KB loaded:', len(kb.docs), 'docs')
          results = kb.retrieve('how to register to vote', top_k=2)
          print('RAG test OK:', len(results), 'results returned')
          "

      - name: Verify FastAPI app loads
        run: |
          python -c "
          import os
          os.environ['GEMINI_API_KEY'] = 'test_placeholder'
          import main
          print('FastAPI app v' + main.app.version + ' loaded OK')
          "

  # ── Job 2: Build & Smoke Test Docker Image ──────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t electwise:latest .

      - name: Smoke test container health endpoint
        run: |
          docker run -d \
            --name ew_test \
            -p 8080:8080 \
            -e GEMINI_API_KEY=test_placeholder \
            -e PORT=8080 \
            electwise:latest
          echo "Waiting for container to start..."
          sleep 8
          docker logs ew_test
          curl --retry 3 --retry-delay 2 -f http://localhost:8080/health \
            && echo "Health check passed!" \
            || (echo "Health check FAILED"; docker logs ew_test; exit 1)
          docker stop ew_test && docker rm ew_test

  # ── Job 3: Deploy to Google Cloud Run (main branch only) ────────────────────
  deploy:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    # Required GitHub Secrets:
    #   GCP_SA_KEY      — Service account JSON key (base64 encoded)
    #   GCP_PROJECT_ID  — Your GCP project ID (e.g. week2-494620)
    #   GEMINI_API_KEY  — Your Google Gemini API key
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required APIs
        run: |
          gcloud services enable run.googleapis.com \
            cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy electwise \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --timeout 60 \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Print deployed URL
        run: |
          URL=$(gcloud run services describe electwise \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format "value(status.url)")
          echo "Deployed to: $URL"
          curl -f "$URL/health" && echo "Live health check passed!"
